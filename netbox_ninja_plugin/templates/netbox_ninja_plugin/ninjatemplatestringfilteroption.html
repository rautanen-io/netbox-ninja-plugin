{% extends 'generic/object.html' %}

{% block content %}
<div class="col col-md-6">
    <div class="card">
        <h5 class="card-header d-flex justify-content-between">
            <span>String Filter Option</span>
        </h5>
        <table class="table table-hover attr-table">
            <tr>
                <td style="min-width:42px;">Value</td>
                <td style="min-width:42px;"><code>{{ object.value }}</code></td>
            </tr>
            <tr>
                <td style="min-width:42px;">Label</td>
                <td style="min-width:42px;">{{ object.label|default:"No label assigned" }}</td>
            </tr>
            <tr>
                <td style="min-width:42px;">String Filter</td>
                <td style="min-width:42px;">
                    <a href="{{ object.string_filter.get_absolute_url }}">{{ object.string_filter.name }}</a>
                </td>
            </tr>
        </table>
    </div>
    <div>
        {% include 'inc/panels/tags.html' %}
    </div>
</div>
{% endblock %}
